version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: asm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asm_secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-asm_database}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asm_user} -d ${POSTGRES_DB:-asm_database}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asm_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-asm_user}:${POSTGRES_PASSWORD:-asm_secret_password}@db:5432/${POSTGRES_DB:-asm_database}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-asm_user}:${POSTGRES_PASSWORD:-asm_secret_password}@db:5432/${POSTGRES_DB:-asm_database}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
    driver: local
